[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cai-platform-adapters"
version = "0.1.0"
description = "Vendor/source translation helpers for cai-platform-v2"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "cai-platform-contracts>=0.1.0",
]

[project.optional-dependencies]
test = [
  "pytest>=8,<9",
]

[tool.setuptools.packages.find]
where = ["src"]
